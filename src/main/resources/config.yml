# LmVIP 主配置
# 本插件只通过 LmCore 的 DatabaseRegistryService 获取数据库连接，不在这里配置 MySQL 账号密码。

# LmCore 数据库 profile 名称。
# 需要在 LmCore 中存在同名数据库配置。
database-profile: "LmVIP"

# 周期统计使用的时区。
# 日累充、月累充、周礼包刷新都按这个时区计算。
timezone: "Asia/Shanghai"

# 每周刷新起始日。
# 可用值: MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY
week-start: "MONDAY"

# 旧版兼容项。
# 新消息请优先改 lang.yml 的 prefix；如果 lang.yml 缺失 prefix，会回退到这里。
message-prefix: "&6[LmVIP]&r "

sync:
  # 预留项：LuckPerms 同步失败后的重试间隔。
  # 当前版本主要用于后续扩展，不会创建长期重试任务。
  retry-seconds: 30

  # 旧 VIP 组迁移清理列表。
  # 如果你曾把 vip3 改名为 vipplus3，可把旧组 vip3 写到这里，玩家同步时会被移除。
  # 这里的组只参与清理，不参与 VIP 等级映射。
  legacy-groups: []

cache:
  # 玩家 VIP 快照缓存时间，单位秒。
  # PAPI 主线程读取只会读缓存；缓存过期时异步刷新。
  snapshot-ttl-seconds: 30

  # 玩家退出后保留缓存的时间，单位秒。
  # 计分板/TAB 等高频 PAPI 场景下，短时间重连可复用旧值，超时后自动释放内存。
  retain-after-quit-seconds: 300

reward:
  # 奖励命令从异步领取流程切回主线程执行时的等待超时，单位秒。
  # 超时或命令返回失败时，会把领取记录标记为 failed，并等待管理员 retry 或 reset。
  command-timeout-seconds: 5

# LmCore ExecutionService 玩家可见反馈。
# 只在 LmVIP 已确认成功的路径后执行：充值入账、VIP 等级变化、奖励领取成功、手动权益刷新成功。
# GUI 展示、PlaceholderAPI、状态预览和失败/重复订单路径不会调用 ExecutionService。
# steps 只允许 LmCore ExecutionService 支持的玩家可见动作：
# [message], [broadcast]/[messageAll], [action]/[actionAll], [title]/[titleAll], [sound], [close], [delay]。
# 这里不会执行控制台命令、OP、权限组、经验或跨服传送。
execution-feedback:
  enabled: true

  recharge-success:
    enabled: true
    steps:
      - "[message]&aVIP 续费到账，本次增加 &e{amount}&a 点，当前等级 &e{vip_level_name}&a。"
      - "[actionbar]&aVIP 续费成功，当前 &e{vip_level_name}"

  level-changed:
    enabled: true
    steps:
      - "[title]&6VIP {vip_level_name}|&f等级已从 {previous_vip_level_name} 提升|10|50|10"
      - "[sound]ENTITY_PLAYER_LEVELUP:1.0:1.0"

  reward-claim-success:
    enabled: true
    steps:
      - "[actionbar]&aVIP 奖励领取成功"

  benefits-refresh-success:
    enabled: false
    steps:
      - "[actionbar]&aVIP 权益已刷新：{vip_level_name}"
