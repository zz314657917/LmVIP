# LmVIP 等级与奖励配置
# total-points 决定永久 VIP 等级，group 会同步到 LuckPerms。
# 日/月累充和周礼包只影响奖励领取资格，不会让永久 VIP 权限失效。

levels:
  # VIP1 配置。节点名必须是数字等级。
  "1":
    # 展示名称，支持 & 颜色符号。
    name: "&aVIP1"

    # 达到此总累充后永久拥有该 VIP 等级。
    total-points: 100

    # LuckPerms 权限组名。
    group: "vip1"

    # GUI 中展示的永久福利说明。
    benefits:
      - "&7永久身份: &aVIP1"
      - "&7基础礼包与周目福利"

    # 每日刷新：今日累充达到 threshold 后可领取。
    daily-reward:
      threshold: 10
      commands:
        - "say %player% 领取了 VIP1 日累充奖励"

    # 每周刷新：本月累充达到 monthly-threshold 后，每周可领取一次。
    weekly-reward:
      monthly-threshold: 100
      commands:
        - "say %player% 领取了 VIP1 周礼包"

    # 每月刷新：本月累充达到 threshold 后可领取。
    monthly-reward:
      threshold: 100
      commands:
        - "say %player% 领取了 VIP1 月累充奖励"

    # 一次性礼包：玩家首次达到此 VIP 等级后永久只可领取一次，换周目不会重置。
    once-reward:
      commands:
        - "say %player% 领取了 VIP1 一次性礼包"

  "2":
    name: "&bVIP2"
    total-points: 500
    group: "vip2"
    benefits:
      - "&7永久身份: &bVIP2"
      - "&7更高等级的周目福利"
    daily-reward:
      threshold: 30
      commands:
        - "say %player% 领取了 VIP2 日累充奖励"
    weekly-reward:
      monthly-threshold: 300
      commands:
        - "say %player% 领取了 VIP2 周礼包"
    monthly-reward:
      threshold: 300
      commands:
        - "say %player% 领取了 VIP2 月累充奖励"
    once-reward:
      commands:
        - "say %player% 领取了 VIP2 一次性礼包"

  "3":
    name: "&dVIP3"
    total-points: 1000
    group: "vip3"
    benefits:
      - "&7永久身份: &dVIP3"
      - "&7高阶 VIP 福利"
    daily-reward:
      threshold: 50
      commands:
        - "say %player% 领取了 VIP3 日累充奖励"
    weekly-reward:
      monthly-threshold: 500
      commands:
        - "say %player% 领取了 VIP3 周礼包"
    monthly-reward:
      threshold: 500
      commands:
        - "say %player% 领取了 VIP3 月累充奖励"
    once-reward:
      commands:
        - "say %player% 领取了 VIP3 一次性礼包"
